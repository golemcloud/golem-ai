[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.build]
run_task = { name = [
    "build-veo",
    "build-stability",
    "build-kling",
    "build-runway",
] }

[tasks.build-portable]
run_task = { name = [
    "build-veo-portable",
    "build-stability-portable",
    "build-kling-portable",
    "build-runway-portable",
] }

[tasks.release-build]
run_task = { name = [
    "release-build-veo",
    "release-build-stability",
    "release-build-kling",
    "release-build-runway",
] }

[tasks.release-build-portable]
run_task = { name = [
    "release-build-veo-portable",
    "release-build-stability-portable",
    "release-build-kling-portable",
    "release-build-runway-portable",
] }

[tasks.build-veo]
command = "cargo"
args = ["build", "-p", "golem-ai-video-veo"]

[tasks.build-veo-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-veo", "--no-default-features"]

[tasks.build-stability]
command = "cargo"
args = ["build", "-p", "golem-ai-video-stability"]

[tasks.build-stability-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-stability", "--no-default-features"]

[tasks.build-kling]
command = "cargo"
args = ["build", "-p", "golem-ai-video-kling"]

[tasks.build-kling-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-kling", "--no-default-features"]

[tasks.build-runway]
command = "cargo"
args = ["build", "-p", "golem-ai-video-runway"]

[tasks.build-runway-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-runway", "--no-default-features"]

[tasks.release-build-veo]
command = "cargo"
args = ["build", "-p", "golem-ai-video-veo", "--release"]

[tasks.release-build-veo-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-veo", "--release", "--no-default-features"]

[tasks.release-build-stability]
command = "cargo"
args = ["build", "-p", "golem-ai-video-stability", "--release"]

[tasks.release-build-stability-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-stability", "--release", "--no-default-features"]

[tasks.release-build-kling]
command = "cargo"
args = ["build", "-p", "golem-ai-video-kling", "--release"]

[tasks.release-build-kling-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-kling", "--release", "--no-default-features"]

[tasks.release-build-runway]
command = "cargo"
args = ["build", "-p", "golem-ai-video-runway", "--release"]

[tasks.release-build-runway-portable]
command = "cargo"
args = ["build", "-p", "golem-ai-video-runway", "--release", "--no-default-features"]

[tasks.build-test-components]
dependencies = ["build"]
description = "Builds video test components with golem-cli"
script = '''
cd ../test/video

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset veo-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset stability-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset kling-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset runway-debug

cd ../video-advanced

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset kling-debug
golem-cli --dev-mode clean
'''

[tasks.release-build-test-components]
dependencies = ["release-build"]
description = "Builds video test components with golem-cli"
script = '''
cd ../test/video

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset veo-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset stability-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset kling-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset runway-release

cd ../video-advanced

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset kling-release
golem-cli --dev-mode clean
'''
