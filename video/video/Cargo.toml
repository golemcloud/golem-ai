[package]
name = "golem-ai-video"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with Video APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[dependencies]
golem-rust = { workspace = true }
golem-wasi-http = { workspace = true }
log = { workspace = true }
mime = "0.3.17"
mime_guess = { workspace = true }
nom = { version = "7.1", default-features = false }
thiserror = "2.0.12"
wasi-logger = "0.1.2"

[features]
default = ["durability"]
durability = ["golem-rust/durability"]
