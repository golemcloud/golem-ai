[package]
name = "golem-ai-video-veo"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with Google Veo video APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[features]
default = ["durability"]
durability = ["golem-rust/durability", "golem-ai-video/durability"]

[dependencies]
golem-ai-video = { path = "../video", version = "0.0.0", default-features = false }

golem-rust = { workspace = true }
golem-wasi-http = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
urlencoding = "2.1"

# GCP authentication dependencies
rsa = "0.9"
pkcs8 = "0.10"
sha2 = "0.10"
data-encoding = "2.4"
