[package]
name = "golem-ai-video-stability"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with Stability AI video APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[features]
default = ["durability"]
durability = ["golem-rust/durability", "golem-ai-video/durability"]

[dependencies]
golem-ai-video = { path = "../video", version = "0.0.0", default-features = false }

golem-rust = { workspace = true }
golem-wasi-http = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
