[package]
name = "golem-web-search-google"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with Google Search APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[features]
default = ["durability"]
durability = ["golem-rust/durability", "golem-web-search/durability"]

[dependencies]
golem-web-search = { path = "../websearch", version = "0.0.0", default-features = false }
golem-rust = { workspace = true }
golem-wasi-http = { workspace = true, features = ["json"] }
log = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
base64 = { workspace = true }
url = "2.5"
urlencoding = "2.1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

