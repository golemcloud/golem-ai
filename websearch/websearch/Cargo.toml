[package]
name = "golem-ai-web-search"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with web search APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[features]
default = ["golem"]
golem = ["dep:golem-rust", "golem-rust/durability", "golem-rust/export_golem_agentic"]

[dependencies]
golem-rust = { workspace = true, optional = true }
golem-wasi-http = { workspace = true }
log = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
wasi-logger = "0.1.2"
