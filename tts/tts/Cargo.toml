[package]
name = "golem-ai-tts"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with Text to Speech APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[dependencies]
golem-rust = { workspace = true }
log = { workspace = true }
mime = "0.3.17"
nom = { version = "7.1", default-features = false }
golem-wasi-http = { workspace = true }
thiserror = "2.0.12"
wasi-logger = "0.1.2"


[features]
default = ["durability"]
durability = ["golem-rust/durability"]
