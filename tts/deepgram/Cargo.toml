[package]
name = "golem-tts-deepgram"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-llm"
description = "WebAssembly component for working with Deepgram Aura TTS API, with special support for Golem Cloud"

[lib]
path = "src/lib.rs"
crate-type = ["cdylib"]

[features]
default = ["durability"]
durability = ["golem-rust/durability", "golem-tts/durability"]

[dependencies]
golem-tts = { workspace = true }
golem-rust = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wit-bindgen-rt = { workspace = true }
wstd = { workspace = true }
bytes = "1.10.1"
derive_more = { version = "2.0.1", features = ["from"] }
http = "=1.3.1"
url = "2.5.4"
once_cell = "1.21.3"

[dev-dependencies]
base64 = { workspace = true }

[package.metadata.component]
package = "golem:tts-deepgram"

[package.metadata.component.bindings]
generate_unused_types = true

[package.metadata.component.bindings.with]
"golem:tts/types@1.0.0" = "golem_tts::golem::tts::types"
"golem:tts/voices@1.0.0" = "golem_tts::golem::tts::voices"
"golem:tts/synthesis@1.0.0" = "golem_tts::golem::tts::synthesis"
"golem:tts/streaming@1.0.0" = "golem_tts::golem::tts::streaming"
"golem:tts/advanced@1.0.0" = "golem_tts::golem::tts::advanced"

[package.metadata.component.target]
path = "wit"

[package.metadata.component.target.dependencies]
"golem:tts" = { path = "wit/deps/golem-tts" }
