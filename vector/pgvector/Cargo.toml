[package]
name = "golem-ai-vector-pgvector"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with pgvector APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[features]
# `golem-rust` is mandatory because the pgvector client depends on the
# `golem::rdbms::postgres` host bindings to talk to PostgreSQL.
default = ["golem"]
golem = ["golem-ai-vector/golem"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-vector = { workspace = true }
golem-wasi-http = { workspace = true }

base64 = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
