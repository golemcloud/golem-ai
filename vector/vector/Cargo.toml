[package]
name = "golem-ai-vector"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with vector databases on Golem Cloud"

[lib]
path = "src/lib.rs"

[dependencies]
golem-rust = { workspace = true, optional = true }
golem-wasi-http = { workspace = true }

log = { workspace = true }
regex = "1.11.1"
serde_json = { workspace = true }
thiserror = "2.0.12"
wasi-logger = "0.1.2"

[features]
default = ["golem"]
golem = ["dep:golem-rust", "golem-rust/durability", "golem-rust/export_golem_agentic"]
