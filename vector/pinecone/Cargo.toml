[package]
name = "golem-ai-vector-pinecone"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem-ai"
description = "Library for working with Pinecone APIs on Golem Cloud"

[lib]
path = "src/lib.rs"

[features]
default = ["durability"]
durability = ["golem-rust/durability", "golem-ai-vector/durability"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-vector = { workspace = true }
golem-wasi-http = { workspace = true }

base64 = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
urlencoding = "2.1"
