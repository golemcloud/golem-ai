[package]
name = "test_tts"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["elevenlabs"]
elevenlabs = ["golem-ai-tts-elevenlabs"]
deepgram = ["golem-ai-tts-deepgram"]
google = ["golem-ai-tts-google"]
aws = ["golem-ai-tts-aws"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-tts = { path = "../../../../tts/tts" }
golem-ai-tts-elevenlabs = { path = "../../../../tts/elevenlabs", optional = true }
golem-ai-tts-deepgram = { path = "../../../../tts/deepgram", optional = true }
golem-ai-tts-google = { path = "../../../../tts/google", optional = true }
golem-ai-tts-aws = { path = "../../../../tts/aws", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
