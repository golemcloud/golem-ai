          to: ../../golem-temp/agents/{{ component_name | to_snake_case }}_pinecone_debug.static.wasm
        sourceWit: .wit/wit
        generatedWit: ../../golem-temp/agents/{{ component_name | to_snake_case }}/wit-generated
        componentWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_pinecone_debug.static.wasm
        linkedWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_pinecone_debug.wasm
        clean:
        - src/bindings.rs

      qdrant-debug:
        build:
        - command: cargo component build --no-default-features --features qdrant
