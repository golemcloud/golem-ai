[package]
name = "test_vector"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["milvus"]
milvus = ["golem-ai-vector-milvus"]
pinecone = ["golem-ai-vector-pinecone"]
qdrant = ["golem-ai-vector-qdrant"]
pgvector = ["golem-ai-vector-pgvector"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-vector = { path = "../../../../vector/vector" }
golem-ai-vector-milvus = { path = "../../../../vector/milvus", optional = true }
golem-ai-vector-pinecone = { path = "../../../../vector/pinecone", optional = true }
golem-ai-vector-qdrant = { path = "../../../../vector/qdrant", optional = true }
golem-ai-vector-pgvector = { path = "../../../../vector/pgvector", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
