# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: "1.5.0"
componentTemplates:
  rust-custom:
    presets:
      debug:
        default: true
        build:
        - command: cargo component build
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_debug.wasm
        clean:
        - src/bindings.rs
      release:
        build:
        - command: cargo component build --release
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_release.wasm
        clean:
        - src/bindings.rs
customCommands:
  cargo-clean:
  - command: cargo clean
