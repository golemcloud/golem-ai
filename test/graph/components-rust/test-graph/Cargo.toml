[package]
name = "test_graph"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["neo4j"]
neo4j = ["golem-ai-graph-neo4j"]
arangodb = ["golem-ai-graph-arangodb"]
janusgraph = ["golem-ai-graph-janusgraph"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-graph = { path = "../../../../graph/graph" }
golem-ai-graph-neo4j = { path = "../../../../graph/neo4j", optional = true }
golem-ai-graph-arangodb = { path = "../../../../graph/arangodb", optional = true }
golem-ai-graph-janusgraph = { path = "../../../../graph/janusgraph", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
