[package]
name = "test_search"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["algolia"]
algolia = ["golem-ai-search-algolia"]
elasticsearch = ["golem-ai-search-elasticsearch"]
meilisearch = ["golem-ai-search-meilisearch"]
opensearch = ["golem-ai-search-opensearch"]
typesense = ["golem-ai-search-typesense"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-search = { path = "../../../../search/search" }
golem-ai-search-algolia = { path = "../../../../search/algolia", optional = true }
golem-ai-search-elasticsearch = { path = "../../../../search/elasticsearch", optional = true }
golem-ai-search-meilisearch = { path = "../../../../search/meilisearch", optional = true }
golem-ai-search-opensearch = { path = "../../../../search/opensearch", optional = true }
golem-ai-search-typesense = { path = "../../../../search/typesense", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
