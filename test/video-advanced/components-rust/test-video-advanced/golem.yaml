# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json

manifestVersion: "1.5.0"
components:
  test:video-advanced:
    dir: "."
    templates: rust-custom
    env:
      # KLING_ACCESS_KEY: "{{ KLING_ACCESS_KEY }}"
      # KLING_SECRET_KEY: "{{ KLING_SECRET_KEY }}"
      # RUNWAY_API_KEY: "{{ RUNWAY_API_KEY }}"
      # STABILITY_API_KEY: "{{ STABILITY_API_KEY }}"
      # VEO_PROJECT_ID: "{{ VEO_PROJECT_ID }}"
      # VEO_CLIENT_EMAIL: "{{ VEO_CLIENT_EMAIL }}"
      # VEO_PRIVATE_KEY: "{{ VEO_PRIVATE_KEY }}"

agents:
  VideoAdvancedTest:
    files:
    - sourcePath: ../../data/first.png
      targetPath: /data/first.png
      permissions: read-only
    presets:
      kling-debug:
        files:
        - sourcePath: ../../data/last.png
          targetPath: /data/last.png
          permissions: read-only
        - sourcePath: ../../data/cameracontrol.jpeg
          targetPath: /data/cameracontrol.jpeg
          permissions: read-only
        - sourcePath: ../../data/single-effect.jpeg
          targetPath: /data/single-effect.jpeg
          permissions: read-only
        - sourcePath: ../../data/multi-image.jpeg
          targetPath: /data/multi-image.jpeg
          permissions: read-only
        - sourcePath: ../../data/audio.wav
          targetPath: /data/audio.wav
          permissions: read-only
      kling-release:
        files:
        - sourcePath: ../../data/last.png
          targetPath: /data/last.png
          permissions: read-only
        - sourcePath: ../../data/cameracontrol.jpeg
          targetPath: /data/cameracontrol.jpeg
          permissions: read-only
        - sourcePath: ../../data/single-effect.jpeg
          targetPath: /data/single-effect.jpeg
          permissions: read-only
        - sourcePath: ../../data/multi-image.jpeg
          targetPath: /data/multi-image.jpeg
          permissions: read-only
        - sourcePath: ../../data/audio.wav
          targetPath: /data/audio.wav
          permissions: read-only
