[package]
name = "test_video_advanced"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["kling"]
kling = ["golem-ai-video-kling"]
runway = ["golem-ai-video-runway"]
stability = ["golem-ai-video-stability"]
veo = ["golem-ai-video-veo"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-video = { path = "../../../../video/video" }
golem-ai-video-kling = { path = "../../../../video/kling", optional = true }
golem-ai-video-runway = { path = "../../../../video/runway", optional = true }
golem-ai-video-stability = { path = "../../../../video/stability", optional = true }
golem-ai-video-veo = { path = "../../../../video/veo", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
