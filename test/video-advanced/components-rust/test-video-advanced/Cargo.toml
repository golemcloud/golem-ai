[package]
name = "test_video_advanced"
version = "0.0.1"
edition = "2021"

[features]
default = ["kling"]
kling = []

[package.metadata]

[package.metadata.component]

[package.metadata.component.target]
path = "wit-generated"

[package.metadata.component.target.dependencies]
"golem:video" = { path = "wit-generated/deps/golem-video" }
"test:video-exports" = { path = "wit-generated/deps/test_video-exports" }

[lib]
path = "src/lib.rs"
crate-type = ["cdylib"]
required-features = []

[dependencies]
wit-bindgen-rt = { workspace = true }
