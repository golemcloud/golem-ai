# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.2.2.1/golem.schema.json
# Schema for vscode-yaml
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.2.2.1/golem.schema.json

# See https://learn.golem.cloud/docs/app-manifest#field-reference for field reference
# For creating APIs see https://learn.golem.cloud/invoke/making-custom-apis

includes:
- common-*/golem.yaml
- components-*/*/golem.yaml
witDeps:
- wit/deps

components:
  test:video-advanced:
    profiles:
      # DEBUG PROFILES
      kling:
        files:
          - sourcePath: data/test.png
            targetPath: /data/test.png
            permissions: read-only
          - sourcePath: data/audio.mp3
            targetPath: /data/audio.mp3
            permissions: read-only
          - sourcePath: data/mask.png
            targetPath: /data/mask.png
            permissions: read-only
          - sourcePath: data/video.mp4
            targetPath: /data/video.mp4
            permissions: read-only
        build:
          - command: cargo component build --no-default-features --features kling
            sources:
              - components-rust/test-video-advanced/src
              - components-rust/test-video-advanced/wit-generated
              - common-rust
            targets:
              - target/wasm32-wasip1/debug/test_video_advanced.wasm
          - command: wac plug --plug ../../target/wasm32-wasip1/debug/golem_video_kling.wasm target/wasm32-wasip1/debug/test_video_advanced.wasm -o target/wasm32-wasip1/debug/test_video_advanced_plugged.wasm
            sources:
              - target/wasm32-wasip1/debug/test_video_advanced.wasm
              - ../../target/wasm32-wasip1/debug/golem_video_kling.wasm
            targets:
              - target/wasm32-wasip1/debug/test_video_advanced_plugged.wasm
        sourceWit: components-rust/test-video-advanced/wit
        generatedWit: components-rust/test-video-advanced/wit-generated
        componentWasm: target/wasm32-wasip1/debug/test_video_advanced_plugged.wasm
        linkedWasm: golem-temp/components/test_video_advanced_kling_debug.wasm
        clean:
          - components-rust/test-video-advanced/src/bindings.rs
      # RELEASE PROFILES    
      kling-release:
        files:
          - sourcePath: data/test.png
            targetPath: /data/test.png
            permissions: read-only
          - sourcePath: data/audio.mp3
            targetPath: /data/audio.mp3
            permissions: read-only
          - sourcePath: data/mask.png
            targetPath: /data/mask.png
            permissions: read-only
          - sourcePath: data/video.mp4
            targetPath: /data/video.mp4
            permissions: read-only
        build:
          - command: cargo component build --release --no-default-features --features kling 
            sources:
              - components-rust/test-video-advanced/src
              - components-rust/test-video-advanced/wit-generated
              - common-rust
            targets:
              - target/wasm32-wasip1/release/test_video_advanced.wasm
          - command: wac plug --plug ../../target/wasm32-wasip1/release/golem_video_kling.wasm target/wasm32-wasip1/release/test_video_advanced.wasm -o target/wasm32-wasip1/release/test_video_advanced_plugged.wasm
            sources:
              - target/wasm32-wasip1/release/test_video_advanced.wasm
              - ../../target/wasm32-wasip1/release/golem_video_kling.wasm
            targets:
              - target/wasm32-wasip1/release/test_video_advanced_plugged.wasm
        sourceWit: components-rust/test-video-advanced/wit
        generatedWit: components-rust/test-video-advanced/wit-generated
        componentWasm: target/wasm32-wasip1/release/test_video_advanced_plugged.wasm
        linkedWasm: golem-temp/components/test_video_advanced_kling_release.wasm
        clean:
          - components-rust/test-video-advanced/src/bindings.rs
    defaultProfile: kling

