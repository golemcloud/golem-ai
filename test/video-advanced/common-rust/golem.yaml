# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: "1.5.0"
componentTemplates:
  rust-custom:
    presets:
      # DEBUG PROFILES
      kling-debug:
        files:
        - sourcePath: ../../data/first.png
          targetPath: /data/first.png
          permissions: read-only
        - sourcePath: ../../data/last.png
          targetPath: /data/last.png
          permissions: read-only
        - sourcePath: ../../data/cameracontrol.jpeg
          targetPath: /data/cameracontrol.jpeg
          permissions: read-only
        - sourcePath: ../../data/single-effect.jpeg
          targetPath: /data/single-effect.jpeg
          permissions: read-only
        - sourcePath: ../../data/multi-image.jpeg
          targetPath: /data/multi-image.jpeg
          permissions: read-only
        - sourcePath: ../../data/audio.wav
          targetPath: /data/audio.wav
          permissions: read-only
        build:
        - command: cargo component build --no-default-features --features kling
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_kling_debug.wasm
        clean:
        - src/bindings.rs

      runway-debug:
        build:
        - command: cargo component build --no-default-features --features runway
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_runway_debug.wasm
        clean:
        - src/bindings.rs

      stability-debug:
        build:
        - command: cargo component build --no-default-features --features stability
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_stability_debug.wasm
        clean:
        - src/bindings.rs

      veo-debug:
        build:
        - command: cargo component build --no-default-features --features veo
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_veo_debug.wasm
        clean:
        - src/bindings.rs

      # RELEASE PROFILES
      kling-release:
        files:
        - sourcePath: ../../data/first.png
          targetPath: /data/first.png
          permissions: read-only
        - sourcePath: ../../data/last.png
          targetPath: /data/last.png
          permissions: read-only
        - sourcePath: ../../data/cameracontrol.jpeg
          targetPath: /data/cameracontrol.jpeg
          permissions: read-only
        - sourcePath: ../../data/single-effect.jpeg
          targetPath: /data/single-effect.jpeg
          permissions: read-only
        - sourcePath: ../../data/multi-image.jpeg
          targetPath: /data/multi-image.jpeg
          permissions: read-only
        - sourcePath: ../../data/audio.wav
          targetPath: /data/audio.wav
          permissions: read-only
        build:
        - command: cargo component build --release --no-default-features --features kling
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_kling_release.wasm
        clean:
        - src/bindings.rs

      runway-release:
        build:
        - command: cargo component build --release --no-default-features --features runway
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_runway_release.wasm
        clean:
        - src/bindings.rs

      stability-release:
        build:
        - command: cargo component build --release --no-default-features --features stability
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_stability_release.wasm
        clean:
        - src/bindings.rs

      veo-release:
        build:
        - command: cargo component build --release --no-default-features --features veo
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_veo_release.wasm
        clean:
        - src/bindings.rs
customCommands:
  cargo-clean:
  - command: cargo clean
