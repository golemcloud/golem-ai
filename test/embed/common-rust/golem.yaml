# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: "1.5.0"
componentTemplates:
  rust:
    presets:
      # DEBUG PROFILES
      openai-debug:
        default: true
        build:
        - command: cargo component build --no-default-features --features openai
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_openai_debug.wasm
        clean:
        - src/bindings.rs

      cohere-debug:
        build:
        - command: cargo component build --no-default-features --features cohere
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_cohere_debug.wasm
        clean:
        - src/bindings.rs

      hugging-face-debug:
        build:
        - command: cargo component build --no-default-features --features hugging-face
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_hugging_face_debug.wasm
        clean:
        - src/bindings.rs

      voyageai-debug:
        build:
        - command: cargo component build --no-default-features --features voyageai
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_voyageai_debug.wasm
        clean:
        - src/bindings.rs

      # RELEASE PROFILES
      openai-release:
        build:
        - command: cargo component build --release --no-default-features --features openai
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_openai_release.wasm
        clean:
        - src/bindings.rs

      cohere-release:
        build:
        - command: cargo component build --release --no-default-features --features cohere
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_cohere_release.wasm
        clean:
        - src/bindings.rs

      hugging-face-release:
        build:
        - command: cargo component build --release --no-default-features --features hugging-face
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_hugging_face_release.wasm
        clean:
        - src/bindings.rs

      voyageai-release:
        build:
        - command: cargo component build --release --no-default-features --features voyageai
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_voyageai_release.wasm
        clean:
        - src/bindings.rs
customCommands:
  cargo-clean:
  - command: cargo clean
