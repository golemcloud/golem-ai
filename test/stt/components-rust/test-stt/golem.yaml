# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json

manifestVersion: "1.5.0"
components:
  test:stt:
    templates: rust
    files:
        - sourcePath: samples/jfk.mp3
          targetPath: /samples/jfk.mp3
          permissions: read-only
        - sourcePath: samples/mm1.wav
          targetPath: /samples/mm1.wav
          permissions: read-only
    env:
      # STT_PROVIDER_LOG_LEVEL: "trace"
      # STT_PROVIDER_MAX_RETRIES: "10"

      ## AWS
      # AWS_REGION: "{{ AWS_REGION }}"
      # AWS_ACCESS_KEY: "{{ AWS_ACCESS_KEY }}"
      # AWS_SECRET_KEY: "{{ AWS_SECRET_KEY }}"
      # AWS_BUCKET_NAME: "{{ AWS_BUCKET_NAME }}"

      ## Azure
      # AZURE_REGION: "{{ AZURE_REGION }}"
      # AZURE_SUBSCRIPTION_KEY: "{{ AZURE_SUBSCRIPTION_KEY }}"

      ## Deepgram
      # DEEPGRAM_API_TOKEN: "{{ DEEPGRAM_API_TOKEN }}"
      # DEEPGRAM_ENDPOINT: "{{ DEEPGRAM_ENDPOINT }}"

      ## Google
      # GOOGLE_LOCATION: "{{ GOOGLE_LOCATION }}"
      # GOOGLE_BUCKET_NAME: "{{ GOOGLE_BUCKET_NAME }}"
      # GOOGLE_PROJECT_ID: "{{ GOOGLE_PROJECT_ID }}"
      # GOOGLE_CLIENT_EMAIL: "{{ GOOGLE_CLIENT_EMAIL }}"
      # GOOGLE_PRIVATE_KEY: "{{ GOOGLE_PRIVATE_KEY }}"

      ## Whisper
      # OPENAI_API_KEY: "{{ OPENAI_API_KEY }}"
