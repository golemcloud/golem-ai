[package]
name = "test_stt"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["whisper"]
whisper = ["golem-ai-stt-whisper"]
aws = ["golem-ai-stt-aws"]
azure = ["golem-ai-stt-azure"]
deepgram = ["golem-ai-stt-deepgram"]
google = ["golem-ai-stt-google"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-stt = { path = "../../../../stt/stt" }
golem-ai-stt-whisper = { path = "../../../../stt/whisper", optional = true }
golem-ai-stt-aws = { path = "../../../../stt/aws", optional = true }
golem-ai-stt-azure = { path = "../../../../stt/azure", optional = true }
golem-ai-stt-deepgram = { path = "../../../../stt/deepgram", optional = true }
golem-ai-stt-google = { path = "../../../../stt/google", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
