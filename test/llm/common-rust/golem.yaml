        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_bedrock_debug.wasm
        clean:
        - src/bindings.rs

      grok-debug:
        build:
        - command: cargo component build --no-default-features --features grok
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
