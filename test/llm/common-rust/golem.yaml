# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: "1.5.0"
componentTemplates:
  rust-custom:
    files:
    - sourcePath: ../../data/cat.png
      targetPath: /data/cat.png
      permissions: read-only
    presets:
      # DEBUG PROFILES
      openai-debug:
        build:
        - command: cargo component build --no-default-features --features openai
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_openai_debug.wasm
        clean:
        - src/bindings.rs

      anthropic-debug:
        build:
        - command: cargo component build --no-default-features --features anthropic
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_anthropic_debug.wasm
        clean:
        - src/bindings.rs

      bedrock-debug:
        build:
        - command: cargo component build --no-default-features --features bedrock
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
