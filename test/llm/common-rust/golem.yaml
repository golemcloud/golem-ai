        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_grok_debug.wasm
        clean:
        - src/bindings.rs

