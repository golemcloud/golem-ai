[package]
name = "test_llm"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["openai"]
openai = ["golem-ai-llm-openai"]
anthropic = ["golem-ai-llm-anthropic"]
bedrock = ["golem-ai-llm-bedrock"]
grok = ["golem-ai-llm-grok"]
openrouter = ["golem-ai-llm-openrouter"]
ollama = ["golem-ai-llm-ollama"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-llm = { path = "../../../../llm/llm" }
golem-ai-llm-openai = { path = "../../../../llm/openai", optional = true }
golem-ai-llm-anthropic = { path = "../../../../llm/anthropic", optional = true }
golem-ai-llm-bedrock = { path = "../../../../llm/bedrock", optional = true }
golem-ai-llm-grok = { path = "../../../../llm/grok", optional = true }
golem-ai-llm-openrouter = { path = "../../../../llm/openrouter", optional = true }
golem-ai-llm-ollama = { path = "../../../../llm/ollama", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
