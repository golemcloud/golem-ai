# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-rc3/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: "1.5.0"
componentTemplates:
  rust-custom:
    presets:
      # DEBUG PROFILES
      google-debug:
        default: true
        build:
        - command: cargo component build --no-default-features --features google
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_google_debug.wasm
        clean:
        - src/bindings.rs

      brave-debug:
        build:
        - command: cargo component build --no-default-features --features brave
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_brave_debug.wasm
        clean:
        - src/bindings.rs

      tavily-debug:
        build:
        - command: cargo component build --no-default-features --features tavily
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_tavily_debug.wasm
        clean:
        - src/bindings.rs

      serper-debug:
        build:
        - command: cargo component build --no-default-features --features serper
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/debug/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_serper_debug.wasm
        clean:
        - src/bindings.rs

      # RELEASE PROFILES
      google-release:
        build:
        - command: cargo component build --release --no-default-features --features google
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_google_release.wasm
        clean:
        - src/bindings.rs

      brave-release:
        build:
        - command: cargo component build --release --no-default-features --features brave
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_brave_release.wasm
        clean:
        - src/bindings.rs

      tavily-release:
        build:
        - command: cargo component build --release --no-default-features --features tavily
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_tavily_release.wasm
        clean:
        - src/bindings.rs

      serper-release:
        build:
        - command: cargo component build --release --no-default-features --features serper
          sources:
          - src
          - ../../common-rust
          - Cargo.toml
          - ../../Cargo.toml
          targets:
          - ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        componentWasm: ../../target/wasm32-wasip1/release/{{ component_name | to_snake_case }}.wasm
        outputWasm: ../../golem-temp/agents/{{ component_name | to_snake_case }}_serper_release.wasm
        clean:
        - src/bindings.rs
customCommands:
  cargo-clean:
  - command: cargo clean
