[package]
name = "test_websearch"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["google"]
google = ["golem-ai-web-search-google"]
brave = ["golem-ai-web-search-brave"]
tavily = ["golem-ai-web-search-tavily"]
serper = ["golem-ai-web-search-serper"]

[dependencies]
golem-rust = { workspace = true }
golem-ai-web-search = { path = "../../../../websearch/websearch" }
golem-ai-web-search-google = { path = "../../../../websearch/google", optional = true }
golem-ai-web-search-brave = { path = "../../../../websearch/brave", optional = true }
golem-ai-web-search-tavily = { path = "../../../../websearch/tavily", optional = true }
golem-ai-web-search-serper = { path = "../../../../websearch/serper", optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wstd = { workspace = true }
