[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.clean]
command = "cargo"
args = ["clean"]

[tasks.unit-tests]
command = "cargo"
args = ["test"]

[tasks.build]
script_runner = "@duckscript"
script = '''
domains = array llm video

# if there is no domain passed run for every domain
if is_empty ${1}
    for domain in ${domains}
        exec cargo make --cwd ${domain} build
    end
else
    exec cargo make --cwd ${1} build
end
'''

[tasks.release-build]
script_runner = "@duckscript"
script = '''
domains = array llm video

# if there is no domain passed run for every domain
if is_empty ${1}
    for domain in ${domains}
        exec cargo make --cwd ${domain} release-build
    end
else
    exec cargo make --cwd ${1} release-build
end
'''

[tasks.build-portable]
script_runner = "@duckscript"
script = '''
#!/bin/bash
domains = array llm video

# if there is no domain passed run for every domain
if is_empty ${1}
    for domain in ${domains}
        exec cargo make --cwd ${domain} build-portable
    end
else
    exec cargo make --cwd ${1} build-portable
end
'''

[tasks.release-build-portable]
script_runner = "@duckscript"
script = '''
#!/bin/bash
domains = array llm video

# if there is no domain passed run for every domain
if is_empty ${1}
    for domain in ${domains}
        exec cargo make --cwd ${domain} release-build-portable
    end
else
    exec cargo make --cwd ${1} release-build-portable
end
'''

[tasks.wit]
script_runner = "@duckscript"
script = '''
domains = array llm video

# if there is no domain passed run for every domain
if is_empty ${1}
    for domain in ${domains}
        exec cargo make --cwd ${domain} wit
    end
else
    exec cargo make --cwd ${1} wit
end
'''

[tasks.build-test-components]
dependencies = ["build"]
description = "Builds all test components with golem-cli"
script = '''
cd test/llm

golem-cli --version
golem-cli app clean
golem-cli app build -b anthropic-debug
golem-cli app clean
golem-cli app build -b grok-debug
golem-cli app clean
golem-cli app build -b openai-debug
golem-cli app clean
golem-cli app build -b openrouter-debug
golem-cli app clean
golem-cli app build -b ollama-debug
golem-cli app clean

cd ../video
golem-cli --version
golem-cli app clean
golem-cli app build -b veo-debug
golem-cli app clean
golem-cli app build -b stability-debug
golem-cli app clean
golem-cli app build -b kling-debug
golem-cli app clean
golem-cli app build -b runway-debug
golem-cli app clean

cd ../video-advanced
golem-cli --version
golem-cli app clean
golem-cli app build
'''

[tasks.build-all]
