[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.build]
run_task = { name = [
    "build-algolia",
    "build-elasticsearch",
    "build-meilisearch",
    "build-opensearch",
    "build-typesense",
] }

[tasks.release-build]
run_task = { name = [
    "release-build-algolia",
    "release-build-elasticsearch",
    "release-build-meilisearch",
    "release-build-opensearch",
    "release-build-typesense",
] }

[tasks.build-algolia]
command = "cargo"
args = ["build", "-p", "golem-ai-search-algolia"]

[tasks.build-elasticsearch]
command = "cargo"
args = ["build", "-p", "golem-ai-search-elasticsearch"]

[tasks.build-meilisearch]
command = "cargo"
args = ["build", "-p", "golem-ai-search-meilisearch"]

[tasks.build-opensearch]
command = "cargo"
args = ["build", "-p", "golem-ai-search-opensearch"]

[tasks.build-typesense]
command = "cargo"
args = ["build", "-p", "golem-ai-search-typesense"]

[tasks.release-build-algolia]
command = "cargo"
args = ["build", "-p", "golem-ai-search-algolia", "--release"]

[tasks.release-build-elasticsearch]
command = "cargo"
args = ["build", "-p", "golem-ai-search-elasticsearch", "--release"]

[tasks.release-build-meilisearch]
command = "cargo"
args = ["build", "-p", "golem-ai-search-meilisearch", "--release"]

[tasks.release-build-opensearch]
command = "cargo"
args = ["build", "-p", "golem-ai-search-opensearch", "--release"]

[tasks.release-build-typesense]
command = "cargo"
args = ["build", "-p", "golem-ai-search-typesense", "--release"]

[tasks.build-test-components]
dependencies = ["build"]
description = "Builds search test components with golem-cli"
script = '''
cd ../test/search

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset algolia-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset elasticsearch-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset meilisearch-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset opensearch-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset typesense-debug
'''

[tasks.release-build-test-components]
dependencies = ["release-build"]
description = "Builds search test components with golem-cli"
script = '''
cd ../test/search

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset algolia-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset elasticsearch-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset meilisearch-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset opensearch-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset typesense-release
'''
