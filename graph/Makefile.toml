[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.build]
run_task = { name = [
    "build-arangodb",
    "build-janusgraph",
    "build-neo4j",
] }

[tasks.release-build]
run_task = { name = [
    "release-build-arangodb",
    "release-build-janusgraph",
    "release-build-neo4j",
] }

[tasks.build-arangodb]
command = "cargo"
args = ["build", "-p", "golem-ai-graph-arangodb"]

[tasks.build-janusgraph]
command = "cargo"
args = ["build", "-p", "golem-ai-graph-janusgraph"]

[tasks.build-neo4j]
command = "cargo"
args = ["build", "-p", "golem-ai-graph-neo4j"]

[tasks.release-build-arangodb]
command = "cargo"
args = ["build", "-p", "golem-ai-graph-arangodb", "--release"]

[tasks.release-build-janusgraph]
command = "cargo"
args = ["build", "-p", "golem-ai-graph-janusgraph", "--release"]

[tasks.release-build-neo4j]
command = "cargo"
args = ["build", "-p", "golem-ai-graph-neo4j", "--release"]

[tasks.build-test-components]
dependencies = ["build"]
description = "Builds graph test components with golem-cli"
script = '''
cd ../test/graph

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset arangodb-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset janusgraph-debug
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset neo4j-debug
'''

[tasks.release-build-test-components]
dependencies = ["release-build"]
description = "Builds graph test components with golem-cli"
script = '''
cd ../test/graph

golem-cli --version
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset arangodb-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset janusgraph-release
golem-cli --dev-mode clean
golem-cli --dev-mode build --preset neo4j-release
'''
